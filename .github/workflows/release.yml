name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-26
    env:
      # "true" when Developer ID signing secrets are configured; otherwise the
      # job falls back to an ad-hoc (unsigned, un-notarized) build.
      SIGNED: ${{ secrets.DEVELOPER_ID_CERT_P12 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Generate Secrets Sources
        run: PROJECT_DIR="$GITHUB_WORKSPACE" ./buildscripts/updateSecrets.sh

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up signing
        if: env.SIGNED == 'true'
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"

          # App Store Connect API key — used for both provisioning and notarization.
          echo "$AC_API_KEY_P8" | base64 --decode > "$API_KEY_PATH"
          echo "AC_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

          # Developer ID certificate into a temporary keychain.
          echo "$CERT_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Put the build keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.+)"$/\1/')
          if [ -z "$IDENTITY" ]; then echo "No Developer ID Application identity found"; exit 1; fi
          echo "Using identity: $IDENTITY"
          rm -f "$CERT_PATH"

      - name: Archive (Developer ID)
        if: env.SIGNED == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project NetNewsWire.xcodeproj \
            -scheme NetNewsWire \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/NetNewsWire.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AC_API_KEY_PATH" \
            -authenticationKeyID "$AC_API_KEY_ID" \
            -authenticationKeyIssuerID "$AC_API_ISSUER_ID" \
            ORGANIZATION_IDENTIFIER="${{ secrets.ORGANIZATION_IDENTIFIER }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS=--timestamp \
            | xcbeautify --renderer github-actions

      - name: Export (Developer ID) and notarize
        if: env.SIGNED == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NetNewsWire.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AC_API_KEY_PATH" \
            -authenticationKeyID "$AC_API_KEY_ID" \
            -authenticationKeyIssuerID "$AC_API_ISSUER_ID"

          echo "APP_PATH=$RUNNER_TEMP/export/NetNewsWire.app" >> "$GITHUB_ENV"

      - name: Build (ad-hoc, unsigned fallback)
        if: env.SIGNED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # No signing secrets configured: ad-hoc sign (identity "-") with the -dev
          # entitlements so the Release re-sign scripts still succeed. Not notarized.
          xcodebuild build \
            -project NetNewsWire.xcodeproj \
            -scheme NetNewsWire \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            DEVELOPER_ENTITLEMENTS=-dev \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            | xcbeautify --renderer github-actions
          echo "APP_PATH=build/Build/Products/Release/NetNewsWire.app" >> "$GITHUB_ENV"

      - name: Create the DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          NAME="NetNewsWire-Reeder-Style-${{ steps.version.outputs.version }}.dmg"

          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "NetNewsWire — Reeder Style" \
            -srcfolder "$STAGE" -ov -format UDZO "$NAME"

          echo "path=$NAME" >> "$GITHUB_OUTPUT"

      - name: Notarize and staple
        if: env.SIGNED == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.path }}"

          SUBMIT=$(xcrun notarytool submit "$DMG" \
            --key "$AC_API_KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --output-format json)
          echo "$SUBMIT"
          ID=$(echo "$SUBMIT" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')

          xcrun notarytool wait "$ID" \
            --key "$AC_API_KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" --timeout 30m || true

          # Always print the notary log so failures are diagnosable.
          xcrun notarytool log "$ID" \
            --key "$AC_API_KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" || true

          STATUS=$(xcrun notarytool info "$ID" \
            --key "$AC_API_KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --output-format json | python3 -c 'import sys,json;print(json.load(sys.stdin)["status"])')
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload DMG artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NetNewsWire-Reeder-Style-dmg
          path: ${{ steps.dmg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          generate_release_notes: true
          body: |
            **NetNewsWire — Reeder Style** ${{ steps.version.outputs.version }}

            ${{ env.SIGNED == 'true' && 'Signed with Developer ID and notarized — it opens normally on macOS.' || 'Unsigned, un-notarized build: on first launch, right-click the app and choose **Open** (or run `xattr -dr com.apple.quarantine /Applications/NetNewsWire.app`).' }}
