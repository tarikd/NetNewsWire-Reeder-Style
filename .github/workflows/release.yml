name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-26
    env:
      # "true" when Developer ID signing secrets are configured; otherwise the
      # job falls back to an ad-hoc (unsigned, un-notarized) build.
      SIGNED: ${{ secrets.DEVELOPER_ID_CERT_P12 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Generate Secrets Sources
        run: PROJECT_DIR="$GITHUB_WORKSPACE" ./buildscripts/updateSecrets.sh

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            # Derive the app version from the tag (vX.Y.Z). The marketing string
            # is X.Y.Z; the build number is a monotonic integer X*10000+Y*100+Z
            # that Sparkle compares to decide whether an update is newer.
            SEMVER="${GITHUB_REF_NAME#v}"
            IFS=. read -r MA MI PA <<< "$SEMVER"
            echo "APP_MARKETING_VERSION=$SEMVER" >> "$GITHUB_ENV"
            echo "APP_BUILD_VERSION=$(( ${MA:-0} * 10000 + ${MI:-0} * 100 + ${PA:-0} ))" >> "$GITHUB_ENV"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up signing
        if: env.SIGNED == 'true'
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          PROFILE_APP: ${{ secrets.APPLE_PROFILE_APP }}
          PROFILE_SHARE: ${{ secrets.APPLE_PROFILE_SHARE }}
          PROFILE_SAFARI: ${{ secrets.APPLE_PROFILE_SAFARI }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"

          # Developer ID certificate into a temporary keychain.
          echo "$CERT_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Put the build keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.+)"$/\1/')
          if [ -z "$IDENTITY" ]; then echo "No Developer ID Application identity found"; exit 1; fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using identity: $IDENTITY"
          rm -f "$CERT_PATH"

          # Install the Developer ID provisioning profiles and capture each
          # profile's UUID. Manual signing needs an explicit specifier per
          # target — the command line only accepts one global value, so we pin
          # each target to its profile through that target's xcconfig below.
          DEST="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$DEST"
          install_profile() {
            local b64="$1" tmp="$RUNNER_TEMP/profile.provisionprofile"
            echo "$b64" | base64 --decode > "$tmp"
            local uuid
            uuid=$(security cms -D -i "$tmp" | plutil -extract UUID raw -)
            cp "$tmp" "$DEST/$uuid.provisionprofile"
            echo "$uuid"
          }
          UUID_APP=$(install_profile "$PROFILE_APP")
          UUID_SHARE=$(install_profile "$PROFILE_SHARE")
          UUID_SAFARI=$(install_profile "$PROFILE_SAFARI")
          echo "Installed profiles — app=$UUID_APP share=$UUID_SHARE safari=$UUID_SAFARI"

          printf '\nPROVISIONING_PROFILE_SPECIFIER = %s\n' "$UUID_APP"   >> xcconfig/NetNewsWire_macapp_target.xcconfig
          printf '\nPROVISIONING_PROFILE_SPECIFIER = %s\n' "$UUID_SHARE" >> xcconfig/NetNewsWire_shareextension_target.xcconfig
          printf '\nPROVISIONING_PROFILE_SPECIFIER = %s\n' "$UUID_SAFARI" >> xcconfig/NetNewsWire_safariextension_target.xcconfig

      - name: Build (Developer ID, hardened runtime)
        if: env.SIGNED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # On tag builds, stamp the version derived from the tag so Sparkle can
          # tell this build apart from the installed one. Untagged manual runs
          # keep the project's default version.
          VERSION_ARGS=()
          if [ -n "${APP_BUILD_VERSION:-}" ]; then
            VERSION_ARGS=( "MARKETING_VERSION=$APP_MARKETING_VERSION" "CURRENT_PROJECT_VERSION=$APP_BUILD_VERSION" )
          fi
          xcodebuild build \
            -project NetNewsWire.xcodeproj \
            -scheme NetNewsWire \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            DEVELOPER_ENTITLEMENTS=-dev \
            ORGANIZATION_IDENTIFIER="${{ secrets.ORGANIZATION_IDENTIFIER }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS=--timestamp \
            "${VERSION_ARGS[@]}" \
            | xcbeautify --renderer github-actions
          echo "APP_PATH=build/Build/Products/Release/NetNewsWire.app" >> "$GITHUB_ENV"

      - name: Re-sign Sparkle helpers for notarization
        if: env.SIGNED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/NetNewsWire.app"
          ID="$SIGN_IDENTITY"
          # The project's Sparkle signing phase preserves the helpers' shipped
          # entitlements (which include get-task-allow) and can't reach the
          # Downloader entitlements file in this fork. Re-sign every nested
          # Sparkle binary inside-out with the hardened runtime and a secure
          # timestamp, without preserving entitlements, so get-task-allow is
          # dropped. NetNewsWire isn't sandboxed, so the helpers need none.
          resign() { codesign --force --options runtime --timestamp --sign "$ID" "$1"; }

          # Inner Updater.app bundles (sign their executables, then the bundle).
          find "$APP" -name "Updater.app" -type d | while read -r u; do
            find "$u/Contents/MacOS" -type f -exec codesign --force --options runtime --timestamp --sign "$ID" {} \;
            resign "$u"
          done

          # Autoupdate helper executables.
          find "$APP" -name "Autoupdate" -type f -exec codesign --force --options runtime --timestamp --sign "$ID" {} \;

          # XPC services: inner executables first, then the bundle.
          find "$APP" -name "*.xpc" -type d | while read -r x; do
            find "$x/Contents/MacOS" -type f -exec codesign --force --options runtime --timestamp --sign "$ID" {} \;
            resign "$x"
          done

          # Sparkle framework itself.
          if [ -d "$APP/Contents/Frameworks/Sparkle.framework" ]; then
            resign "$APP/Contents/Frameworks/Sparkle.framework"
          fi

          # Belt and suspenders: if any extension still carries get-task-allow,
          # strip just that key and re-sign, keeping the rest (e.g. app group).
          for ext in "$APP"/Contents/PlugIns/*.appex; do
            [ -e "$ext" ] || continue
            ENT="$RUNNER_TEMP/$(basename "$ext").plist"
            if codesign -d --entitlements - --xml "$ext" > "$ENT" 2>/dev/null \
               && /usr/libexec/PlistBuddy -c "Print :com.apple.security.get-task-allow" "$ENT" >/dev/null 2>&1; then
              /usr/libexec/PlistBuddy -c "Delete :com.apple.security.get-task-allow" "$ENT"
              codesign --force --options runtime --timestamp --entitlements "$ENT" --sign "$ID" "$ext"
              echo "Stripped get-task-allow from $(basename "$ext")"
            fi
          done

          # Re-seal the app. Its own entitlements are already a clean Developer ID
          # set (no get-task-allow), so preserve them.
          codesign --force --options runtime --timestamp --preserve-metadata=entitlements --sign "$ID" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build (ad-hoc, unsigned fallback)
        if: env.SIGNED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # No signing secrets configured: ad-hoc sign (identity "-") with the -dev
          # entitlements so the Release re-sign scripts still succeed. Not notarized.
          xcodebuild build \
            -project NetNewsWire.xcodeproj \
            -scheme NetNewsWire \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            DEVELOPER_ENTITLEMENTS=-dev \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            | xcbeautify --renderer github-actions
          echo "APP_PATH=build/Build/Products/Release/NetNewsWire.app" >> "$GITHUB_ENV"

      - name: Create the DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          NAME="NetNewsWire-Reeder-Style-${{ steps.version.outputs.version }}.dmg"

          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "NetNewsWire — Reeder Style" \
            -srcfolder "$STAGE" -ov -format UDZO "$NAME"

          echo "path=$NAME" >> "$GITHUB_OUTPUT"

      - name: Notarize and staple
        if: env.SIGNED == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.path }}"
          KEY="$RUNNER_TEMP/AuthKey.p8"
          echo "$AC_API_KEY_P8" | base64 --decode > "$KEY"

          SUBMIT=$(xcrun notarytool submit "$DMG" \
            --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --output-format json)
          echo "$SUBMIT"
          ID=$(echo "$SUBMIT" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')

          xcrun notarytool wait "$ID" \
            --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" --timeout 30m || true

          # Always print the notary log so failures are diagnosable.
          xcrun notarytool log "$ID" \
            --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" || true

          STATUS=$(xcrun notarytool info "$ID" \
            --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --output-format json | python3 -c 'import sys,json;print(json.load(sys.stdin)["status"])')
          rm -f "$KEY"
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Build Sparkle appcast
        if: env.SIGNED == 'true' && startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.path }}"
          GEN=$(find build/SourcePackages/artifacts -type f -name generate_appcast -path "*/bin/*" | head -1)
          if [ -z "$GEN" ]; then echo "generate_appcast not found under build/SourcePackages"; exit 1; fi

          # generate_appcast reads each archive's version from the app bundle it
          # mounts, signs it with the EdDSA key (from stdin), and writes
          # appcast.xml whose enclosure URL is the prefix + the DMG filename —
          # i.e. this tag's release asset.
          WORK="$RUNNER_TEMP/appcast"
          mkdir -p "$WORK"
          cp "$DMG" "$WORK/"
          PREFIX="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$GEN" --ed-key-file - \
            --download-url-prefix "$PREFIX" \
            --link "https://github.com/${{ github.repository }}" \
            "$WORK"

          cp "$WORK/appcast.xml" appcast.xml
          echo "=== appcast.xml ==="
          cat appcast.xml

      - name: Upload DMG artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NetNewsWire-Reeder-Style-dmg
          path: ${{ steps.dmg.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.dmg.outputs.path }}
            appcast.xml
          generate_release_notes: true
          body: |
            **NetNewsWire — Reeder Style** ${{ steps.version.outputs.version }}

            ${{ env.SIGNED == 'true' && 'Signed with Developer ID and notarized — it opens normally on macOS.' || 'Unsigned, un-notarized build: on first launch, right-click the app and choose **Open** (or run `xattr -dr com.apple.quarantine /Applications/NetNewsWire.app`).' }}
